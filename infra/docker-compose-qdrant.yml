services:
  qdrant:
    # Pin to v1.16.2 to match the direct io.qdrant:client:1.16.2 dependency.
    # Parameterized RRF queries require the matching v1.16 protobuf fields.
    # Use GitHub Container Registry to avoid Docker Hub rate limits (per DK1)
    image: ghcr.io/qdrant/qdrant/qdrant:v1.16.2
    container_name: qdrant
    ports:
      - "8087:6333"  # REST (mapped into allowed range)
      - "8086:6334"  # gRPC (mapped into allowed range)
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
