# [ND1f] Ban I-prefix on interfaces
# Hungarian notation is an anti-pattern; type names declare their domain role.

id: ban-i-prefix-interface
language: tsx
severity: error
message: "[ND1f] I-prefix banned. Fix: IUser → User | See AGENTS.md [ND1f]"

rule:
  kind: interface_declaration
  has:
    kind: type_identifier
    regex: ^I[A-Z][a-zA-Z0-9]*$

files:
  - "src/**/*.ts"
  - "src/**/*.tsx"

ignores:
  - "node_modules/**"
  - "**/*.d.ts"
